name: E2E (examples/chatbot-openai-with-billing-polar)

on:
  push:
    paths:
      - 'examples/chatbot-openai-with-billing-polar/**'
  pull_request:
    paths:
      - 'examples/chatbot-openai-with-billing-polar/**'

jobs:
  e2e-chatbot-openai-with-billing-polar:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.OSS_AUTH_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OSS_OPENAI_API_KEY }}
      POSTGRES_URL: ${{ secrets.OSS_POSTGRES_URL }}
      POLAR_ACCESS_TOKEN: ${{ secrets.OSS_POLAR_ACCESS_TOKEN }}
      POLAR_SERVER: 'sandbox'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter="chatbot^..." build

      - name: Cache Playwright browsers
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter chatbot run test:e2e:setup
        working-directory: examples/chatbot-openai-with-billing-polar

      - name: Run E2E tests
        run: pnpm --filter chatbot run test:e2e
        working-directory: examples/chatbot-openai-with-billing-polar

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: examples/chatbot-openai-with-billing-polar/playwright-report/
          retention-days: 7
