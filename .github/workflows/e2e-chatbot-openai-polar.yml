name: E2E (examples/chatbot-openai-with-billing-polar-advanced)

on:
  push:
    paths:
      - 'examples/chatbot-openai-with-billing-polar-advanced/**'
  pull_request:
    paths:
      - 'examples/chatbot-openai-with-billing-polar-advanced/**'

jobs:
  e2e-chatbot-openai-with-billing-polar-advanced:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.OSS_AUTH_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OSS_OPENAI_API_KEY }}
      POSTGRES_URL: ${{ secrets.OSS_POSTGRES_URL }}
      POLAR_ACCESS_TOKEN: ${{ secrets.OSS_POLAR_ACCESS_TOKEN }}
      POLAR_SERVER: 'sandbox'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter="chatbot^..." build

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter chatbot run test:e2e:setup
        working-directory: examples/chatbot-openai-with-billing-polar-advanced

      - name: Run E2E tests
        run: pnpm --filter chatbot run test:e2e
        working-directory: examples/chatbot-openai-with-billing-polar-advanced

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: examples/chatbot-openai-with-billing-polar-advanced/playwright-report/
          retention-days: 7
