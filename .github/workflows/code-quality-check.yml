name: Code Quality Check

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'Format Check'
            command: 'pnpm run format:check'
            step_name: 'Verify code formatting'
          - name: 'Lint Check'
            command: 'pnpm turbo run lint'
            step_name: 'Run ESLint checks'
          - name: 'Unused Code Check'
            command: 'pnpm run knip'
            step_name: 'Check for unused code (Knip)'
          - name: 'Security Audit'
            command: 'pnpm audit --audit-level moderate --prod'
            step_name: 'Audit dependencies'
          - name: 'Type Check'
            command: 'pnpm turbo run check-types'
            step_name: 'TypeScript validation'
          - name: 'Build Check'
            command: 'pnpm turbo run build'
            step_name: 'Verify production builds'
          - name: 'Unit Tests'
            command: 'pnpm run test:coverage'
            step_name: 'Run Vitest suite with coverage'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ${{ matrix.step_name }}
        run: ${{ matrix.command }}

      - name: Upload coverage to Codecov
        if: matrix.name == 'Unit Tests'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: narevai/ai-billing 
          fail_ci_if_error: false


  quality-checks-passed:
    name: Quality Checks Passed
    needs: quality-checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify matrix status
        run: |
          if [[ "${{ needs.quality-checks.result }}" != "success" ]]; then
            exit 1
          fi