name: E2E Tests (Chatbot with Billing)

on:
  push:
    paths:
      - 'examples/chatbot-with-billing/**'
  pull_request:
    paths:
      - 'examples/chatbot-with-billing/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm --filter chatbot run test:setup
        working-directory: examples/chatbot-with-billing

      - name: Run E2E tests
        run: pnpm --filter chatbot run test:e2e
        working-directory: examples/chatbot-with-billing
