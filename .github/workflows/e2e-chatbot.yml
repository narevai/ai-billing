name: E2E (examples/chatbot-with-billing-polars)

on:
  push:
    paths:
      - 'examples/chatbot-with-billing-polars/**'
  pull_request:
    paths:
      - 'examples/chatbot-with-billing-polars/**'

jobs:
  e2e-chatbot-with-billing-polars:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.OSS_AUTH_SECRET }}
      AI_GATEWAY_API_KEY: ${{ secrets.OSS_AI_GATEWAY_API_KEY }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.OSS_BLOB_READ_WRITE_TOKEN }}
      POSTGRES_URL: ${{ secrets.OSS_POSTGRES_URL }}
      REDIS_URL: ${{ secrets.OSS_REDIS_URL }}
      POLAR_ACCESS_TOKEN: ${{ secrets.OSS_POLAR_ACCESS_TOKEN }}
      POLAR_SERVER: 'sandbox'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter="chatbot^..." build

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter chatbot run test:setup
        working-directory: examples/chatbot-with-billing-polars

      - name: Run E2E tests
        run: pnpm --filter chatbot run test:e2e
        working-directory: examples/chatbot-with-billing-polars

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: examples/chatbot-with-billing-polars/playwright-report/
          retention-days: 7
