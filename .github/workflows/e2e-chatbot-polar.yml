name: E2E (examples/chatbot-gateway-with-billing-polar-advanced)

on:
  push:
    paths:
      - 'examples/chatbot-gateway-with-billing-polar-advanced/**'
  pull_request:
    paths:
      - 'examples/chatbot-gateway-with-billing-polar-advanced/**'

jobs:
  e2e-chatbot-gateway-with-billing-polar-advanced:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.OSS_AUTH_SECRET }}
      AI_GATEWAY_API_KEY: ${{ secrets.OSS_AI_GATEWAY_API_KEY }}
      POSTGRES_URL: ${{ secrets.OSS_POSTGRES_URL }}
      POLAR_ACCESS_TOKEN: ${{ secrets.OSS_POLAR_ACCESS_TOKEN }}
      POLAR_SERVER: 'sandbox'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter="chatbot^..." build

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter chatbot run test:e2e:setup
        working-directory: examples/chatbot-gateway-with-billing-polar-advanced

      - name: Run E2E tests
        run: pnpm --filter chatbot run test:e2e
        working-directory: examples/chatbot-gateway-with-billing-polar-advanced

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: examples/chatbot-gateway-with-billing-polar-advanced/playwright-report/
          retention-days: 7
