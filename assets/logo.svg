<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background Card/Invoice -->
  <g transform="translate(100, 48) rotate(-5) scale(0.9)">
    <rect x="0" y="0" width="300" height="400" rx="24" fill="#F8FAFC" filter="url(#shadow)" opacity="0.95" />
    <!-- Invoice Lines -->
    <line x1="48" y1="64" x2="160" y2="64" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round" />
    <line x1="48" y1="104" x2="252" y2="104" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round" />
    <line x1="48" y1="144" x2="200" y2="144" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round" />
    <!-- Invoice bottom elements -->
    <rect x="48" y="280" width="204" height="2" fill="#E2E8F0" />
    <line x1="160" y1="312" x2="252" y2="312" stroke="#94A3B8" stroke-width="16" stroke-linecap="round" />
  </g>

  <!-- Foreground Credit Card -->
  <g transform="translate(96, 200)">
    <rect x="0" y="0" width="340" height="216" rx="24" fill="url(#cardGrad)" filter="url(#shadow)" />
    
    <!-- Card Chip -->
    <rect x="40" y="40" width="56" height="40" rx="8" fill="#FBBF24" opacity="0.9"/>
    <!-- Card Contact Lines -->
    <line x1="68" y1="40" x2="68" y2="80" stroke="#B45309" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="60" x2="96" y2="60" stroke="#B45309" stroke-width="2" opacity="0.5"/>
    
    <!-- Network/AI Connection Dots on Card -->
    <circle cx="48" cy="164" r="6" fill="#FFF" opacity="0.4"/>
    <circle cx="80" cy="164" r="6" fill="#FFF" opacity="0.4"/>
    <circle cx="112" cy="164" r="6" fill="#FFF" opacity="0.4"/>
    <circle cx="144" cy="164" r="6" fill="#FFF" opacity="0.4"/>
    
    <!-- Master/Visa Style Abstract Logo -->
    <circle cx="260" cy="164" r="20" fill="#FFF" opacity="0.2"/>
    <circle cx="292" cy="164" r="20" fill="#FFF" opacity="0.4"/>
    
    <!-- AI Spark on Card -->
    <path d="M260 30 C260 55, 275 70, 300 70 C275 70, 260 85, 260 110 C260 85, 245 70, 220 70 C245 70, 260 55, 260 30 Z" fill="url(#sparkGrad)"/>
    <path d="M220 120 C220 130, 225 135, 235 135 C225 135, 220 140, 220 150 C220 140, 215 135, 205 135 C215 135, 220 130, 220 120 Z" fill="url(#sparkGrad)"/>
  </g>
</svg>